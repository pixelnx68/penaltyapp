<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#161b22" />
      <stop offset="100%" stop-color="#0a0c10" />
    </radialGradient>
    <!-- Neon Blue Glow -->
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Neon Orange Glow -->
    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Blue Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <!-- Orange Gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.05)" stroke-width="4" />

  <!-- Outer Ring / Circle -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#blueGrad)" stroke-width="8" filter="url(#glowBlue)" opacity="0.3" />

  <!-- Volleyball Panels -->
  <g transform="translate(256, 256)">
    <!-- Outer boundary of volleyball -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="url(#blueGrad)" stroke-width="10" filter="url(#glowBlue)" />

    <!-- Left Curved Panel Seam -->
    <path d="M -106 -106 C -30 -60, -30 60, -106 106" fill="none" stroke="url(#orangeGrad)" stroke-width="12" stroke-linecap="round" filter="url(#glowOrange)" />
    
    <!-- Right Curved Panel Seam -->
    <path d="M 106 -106 C 30 -60, 30 60, 106 106" fill="none" stroke="url(#orangeGrad)" stroke-width="12" stroke-linecap="round" filter="url(#glowOrange)" />

    <!-- Top/Bottom Curved Panel Seam -->
    <path d="M -106 -106 C -60 -30, 60 -30, 106 -106" fill="none" stroke="url(#blueGrad)" stroke-width="10" stroke-linecap="round" filter="url(#glowBlue)" />
    <path d="M -106 106 C -60 30, 60 30, 106 106" fill="none" stroke="url(#blueGrad)" stroke-width="10" stroke-linecap="round" filter="url(#glowBlue)" />

    <!-- Center Panel Division Lines -->
    <path d="M -150 0 C -50 20, 50 -20, 150 0" fill="none" stroke="url(#blueGrad)" stroke-width="8" stroke-linecap="round" opacity="0.8" />
    <path d="M 0 -150 C 20 -50, -20 50, 0 150" fill="none" stroke="url(#orangeGrad)" stroke-width="8" stroke-linecap="round" opacity="0.8" />
  </g>
</svg>
